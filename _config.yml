title: Quentin Malé
description: >-
  Personal academic website of Quentin Malé — postdoctoral researcher at Harvard University (CSElab),
  working on computational methods for multiphysics phenomena, high-performance computing and machine
  learning for energy and complex flow systems.
url: "https://quentinmale.github.io"

remote_theme: just-the-docs/just-the-docs

# ---------------------------------------------------------------------------
# Just the Docs configuration
# ---------------------------------------------------------------------------

# Enable the built-in search
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Collapsible sidebar navigation with nested sections
nav_sort: case_insensitive
heading_anchors: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Copyright &copy; Quentin Malé. Site built with Just the Docs."

# Color scheme: "light", "dark", or a custom one
color_scheme: light

# Google Analytics / other Just the Docs plugins can be enabled here later.

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - license.txt
  - vendor

# Make sure every markdown page gets wrapped in the theme's layout
# (index.md overrides this with its own `layout: home`).
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
